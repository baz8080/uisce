name: Build DB

on:
  schedule:
    - cron: '23 17 * * MON,WED,FRI'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync

      - name: Download existing DB
        run: gh release download --pattern "uisce.db" --dir out/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pipeline
        env:
          LOCATIONIQ_API_KEY: ${{ secrets.LOCATIONIQ_API_KEY }}
        run: uv run uisce-pipeline

      - name: Build inferred cases table
        run: uv run uisce-build-inferred

      - name: Publish DB
        run: |
          TAG="$(date +%Y-%m-%d)"
          gh release create "$TAG" out/uisce.db \
            --title "$TAG" \
            --notes "Data refresh" \
          || gh release upload "$TAG" out/uisce.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site
        run: uv run uisce-site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
