name: Build DB

on:
  schedule:
    - cron: '23 17 * * MON,WED,FRI'
  workflow_dispatch:
    inputs:
      replay_closed_at:
        description: >-
          Backfill cases.closed_at by replaying every published release DB.
          Off by default; needed once after the v2 schema lands, and again only
          if the DB is ever restored from an older release.
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true

      - name: Install dependencies
        run: uv sync

      - name: Download existing DB
        run: gh release download --pattern "uisce.db" --dir out/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run pipeline
        env:
          LOCATIONIQ_API_KEY: ${{ secrets.LOCATIONIQ_API_KEY }}
        run: uv run uisce-pipeline

      # Runs after the pipeline so the DB is already migrated to v2 and has this
      # build's own transitions stamped — the replay never overwrites those, and
      # they are the more precise value. The two together leave no gap: the
      # replay covers snapshot-to-snapshot, the pipeline's upsert covers the
      # last snapshot to now. Idempotent, so a repeat run is harmless.
      - name: Backfill closed_at from published snapshots
        if: ${{ inputs.replay_closed_at }}
        run: |
          mkdir -p snaps
          for TAG in $(gh release list --limit 100 --json tagName --jq '.[].tagName'); do
            gh release download "$TAG" --pattern uisce.db -O "snaps/$TAG.db" || true
          done
          uv run uisce-replay-closed-at --snapshots snaps --write
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build inferred cases table
        run: uv run uisce-build-inferred

      - name: Publish DB
        run: |
          TAG="$(date +%Y-%m-%d)"
          gh release create "$TAG" out/uisce.db \
            --title "$TAG" \
            --notes "Data refresh" \
          || gh release upload "$TAG" out/uisce.db --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build site
        run: uv run uisce-site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
